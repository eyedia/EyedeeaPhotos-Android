<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Down</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #F8FAFC;
            color: #1E293B;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #0EA5E9; }
        p { font-size: 16px; line-height: 1.5; color: #64748B; }
        .icon-container {
            width: 160px;
            height: 160px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <!-- Replace 'server_offline.png' with your actual filename -->
        <img src="server_offline.png" alt="Server Down">
    </div>
    <h1>Oops! Server's taking a nap</h1>
    <p>Our servers are catching some Z's right now. Don't worry, we'll keep poking them until they wake up!</p>
    <p>You can still add photos in Settings, and we'll sync them as soon as we're back online.</p>
</body>
</html>
